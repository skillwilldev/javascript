<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript კულისებს მიღმა - ქვიზი</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .quiz-container {
      max-width: 750px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #e94560;
      margin-bottom: 0.4rem;
      font-size: 1.6rem;
      line-height: 1.35;
    }

    .subtitle {
      text-align: center;
      color: #7f8fa6;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .progress-bar-track {
      background: #16213e;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #e94560, #0f3460);
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .question-counter {
      text-align: center;
      margin-bottom: 1rem;
      color: #7f8fa6;
      font-size: 0.95rem;
    }

    .section-label {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-label.main {
      background: #0f3460;
      color: #63b3ed;
    }

    .question-card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      border: 2px solid #0f3460;
      transition: border-color 0.3s ease;
    }

    .question-card.correct {
      border-color: #38a169;
    }

    .question-card.incorrect {
      border-color: #e53e3e;
    }

    .question-text {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      line-height: 1.55;
    }

    pre.code-block {
      background: #0d1b2a;
      border: 1px solid #1b3a5c;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      overflow-x: auto;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      color: #a8d8a8;
      white-space: pre;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-btn {
      background: #1a1a2e;
      border: 2px solid #2c3e6b;
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      color: #e0e0e0;
      font-size: 0.97rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      line-height: 1.45;
    }

    .option-btn:hover:not(.disabled) {
      background: #0f3460;
      border-color: #4a6fa5;
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: #63b3ed;
      background: #1a365d;
    }

    .option-btn.correct-answer {
      border-color: #38a169;
      background: #1c3a2a;
      color: #9ae6b4;
    }

    .option-btn.wrong-answer {
      border-color: #e53e3e;
      background: #3a1c1c;
      color: #feb2b2;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.75;
    }

    .option-btn.disabled.correct-answer {
      opacity: 1;
    }

    .feedback {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background: #1c3a2a;
      color: #68d391;
      border: 1px solid #38a169;
    }

    .feedback.incorrect {
      background: #3a1c1c;
      color: #fc8181;
      border: 1px solid #e53e3e;
    }

    .explanation-box {
      background: #0d1b2a;
      border-left: 4px solid #e94560;
      padding: 1rem 1.2rem;
      margin-top: 0.8rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.92rem;
      color: #b0bec5;
      line-height: 1.6;
      display: none;
    }

    .explanation-box.visible {
      display: block;
    }

    .explanation-box .explanation-title {
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      gap: 1rem;
    }

    .nav-btn {
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn.prev {
      background: #2c3e6b;
      color: #e0e0e0;
    }

    .nav-btn.prev:hover {
      background: #3a5298;
    }

    .nav-btn.next {
      background: #e94560;
      color: #fff;
    }

    .nav-btn.next:hover {
      background: #c73652;
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .results-screen {
      background: #16213e;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      border: 2px solid #0f3460;
    }

    .results-screen h2 {
      color: #e94560;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      border: 6px solid;
    }

    .score-circle.excellent {
      border-color: #38a169;
      color: #68d391;
      background: #1c3a2a;
    }

    .score-circle.good {
      border-color: #d69e2e;
      color: #f6e05e;
      background: #3a351c;
    }

    .score-circle.needs-work {
      border-color: #e53e3e;
      color: #fc8181;
      background: #3a1c1c;
    }

    .score-circle .score-label {
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 0.2rem;
    }

    .score-breakdown {
      margin: 1.5rem 0;
      font-size: 1rem;
      color: #a0aec0;
      line-height: 2;
    }

    .score-breakdown strong {
      color: #e0e0e0;
    }

    .restart-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .restart-btn:hover {
      background: #c73652;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem 0.5rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .question-card {
        padding: 1.3rem;
      }
      pre.code-block {
        font-size: 0.8rem;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>JavaScript კულისებს მიღმა<br />Behind the Scenes - ქვიზი</h1>
    <p class="subtitle">How JavaScript Works Behind the Scenes Quiz</p>

    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <div id="questionArea">
      <p class="question-counter" id="questionCounter"></p>

      <div class="question-card" id="questionCard">
        <span class="section-label main" id="sectionLabel"></span>
        <div class="question-text" id="questionText"></div>
        <pre class="code-block hidden" id="codeBlock"></pre>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation-box" id="explanationBox">
          <div class="explanation-title">ახსნა</div>
          <div id="explanationText"></div>
        </div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">&#8592; წინა</button>
        <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">შემდეგი &#8594;</button>
      </div>
    </div>

    <div class="results-screen hidden" id="resultsScreen">
      <h2>ქვიზი დასრულებულია!</h2>
      <div class="score-circle" id="scoreCircle">
        <span id="scorePercent"></span>
        <span class="score-label" id="scoreLabel"></span>
      </div>
      <div class="score-breakdown" id="scoreBreakdown"></div>
      <button class="restart-btn" onclick="restartQuiz()">&#x1F504; თავიდან დაწყება</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        topic: 'Scope',
        question: "რომელი scope-ის ტიპი არ არსებობს JavaScript-ში?",
        code: null,
        options: [
          "გლობალური scope (Global scope)",
          "ფუნქციის scope (Function scope)",
          "ბლოკის scope (Block scope)",
          "ციკლის scope (Loop scope)"
        ],
        correct: 3,
        explanation: "JavaScript-ში არსებობს 3 ტიპის scope: გლობალური, ფუნქციის და ბლოკის (ES6). ციკლის scope ცალკე არ არსებობს — for/while ციკლის ფიგურულ ფრჩხილებში { } let/const ბლოკის scope-ს ქმნის, ისევე როგორც if-ში."
      },
      {
        topic: 'Scope',
        question: "რას გამოიტანს ეს კოდი?",
        code: `const x = 'global';

function outer() {
  const x = 'outer';
  function inner() {
    console.log(x);
  }
  inner();
}
outer();`,
        options: [
          '"global"',
          '"outer"',
          'undefined',
          'ReferenceError'
        ],
        correct: 1,
        explanation: "inner() ჯერ საკუთარ scope-ში ეძებს x-ს — ვერ პოულობს. scope chain-ით მშობელ scope-ში (outer ფუნქცია) ეძებს — პოულობს 'outer'. scope chain ყოველთვის ყველაზე ახლო მშობლის ცვლადს იყენებს, გლობალურამდე არ ადის."
      },
      {
        topic: 'Block Scope',
        question: "რას გამოიტანს ეს კოდი?",
        code: `if (true) {
  var a = 1;
  let b = 2;
  const c = 3;
}
console.log(a);`,
        options: [
          "1",
          "undefined",
          "ReferenceError",
          "3"
        ],
        correct: 0,
        explanation: "var ბლოკის scope-ს იგნორირებს — ის ფუნქციის scope-შია (ან გლობალურში, თუ ფუნქციის გარეთაა). ამიტომ a ხელმისაწვდომია if ბლოკის გარეთ. let და const კი ბლოკის scope-შია და გარეთ ReferenceError-ს გამოიწვევს."
      },
      {
        topic: 'Block Scope',
        question: "რას გამოიტანს ეს კოდი?",
        code: `if (true) {
  var a = 1;
  let b = 2;
  const c = 3;
}
console.log(b);`,
        options: [
          "2",
          "undefined",
          "ReferenceError",
          "null"
        ],
        correct: 2,
        explanation: "let ბლოკის scope-შია. if ბლოკის გარეთ b ცვლადზე წვდომა შეუძლებელია. ReferenceError: b is not defined."
      },
      {
        topic: 'Hoisting',
        question: "რას გამოიტანს ეს კოდი?",
        code: `console.log(x);
var x = 5;`,
        options: [
          "5",
          "undefined",
          "ReferenceError",
          "null"
        ],
        correct: 1,
        explanation: "var ჰოისტდება, მაგრამ undefined მნიშვნელობით. ანუ JavaScript ძრავი კოდის შესრულებამდე 'ხედავს' var x დეკლარაციას და ანიჭებს undefined-ს. მნიშვნელობა 5 მხოლოდ იმ ხაზზე მინიჭდება, სადაც x = 5 წერია."
      },
      {
        topic: 'Hoisting',
        question: "რას გამოიტანს ეს კოდი?",
        code: `console.log(y);
let y = 10;`,
        options: [
          "10",
          "undefined",
          "ReferenceError: Cannot access 'y' before initialization",
          "null"
        ],
        correct: 2,
        explanation: "let ტექნიკურად ჰოისტდება, მაგრამ TDZ-შია (Temporal Dead Zone). ეს ნიშნავს, რომ ძრავმა იცის y-ის არსებობის შესახებ, მაგრამ დეკლარაციის ხაზამდე მასზე წვდომა აკრძალულია. შეცდომის ტექსტი 'Cannot access before initialization' სწორედ TDZ-ს მიუთითებს."
      },
      {
        topic: 'Hoisting',
        question: "რას გამოიტანს ეს კოდი?",
        code: `console.log(sum(2, 3));

function sum(a, b) {
  return a + b;
}`,
        options: [
          "5",
          "undefined",
          "ReferenceError",
          "TypeError"
        ],
        correct: 0,
        explanation: "Function declaration სრულად ჰოისტდება — ანუ ფუნქცია ხელმისაწვდომია კოდის ნებისმიერ ადგილას, მისი დეკლარაციამდეც. ამიტომ sum(2, 3) სწორად გამოთვლის 2 + 3 = 5. ეს მხოლოდ function declaration-ებზე ვრცელდება, არა expression-ებსა და arrow ფუნქციებზე."
      },
      {
        topic: 'Hoisting',
        question: "რას გამოიტანს ეს კოდი?",
        code: `console.log(multiply(2, 3));

const multiply = function(a, b) {
  return a * b;
};`,
        options: [
          "6",
          "undefined",
          "ReferenceError",
          "TypeError"
        ],
        correct: 2,
        explanation: "Function expression const-ით არის გამოცხადებული. const ჰოისტდება, მაგრამ TDZ-შია, ამიტომ ReferenceError: Cannot access 'multiply' before initialization. ფუნქციის expression-ები და arrow ფუნქციები იმ ცვლადის წესებს ემორჩილება, რომელშიც ინახება (var, let, const)."
      },
      {
        topic: 'this keyword',
        question: "ობიექტის მეთოდის გამოძახებისას <code>this</code> რას მიუთითებს?",
        code: null,
        options: [
          "window ობიექტს",
          "undefined-ს",
          "ობიექტს, რომელიც მეთოდს იძახებს",
          "თავად ფუნქციას"
        ],
        correct: 2,
        explanation: "როცა ფუნქცია ობიექტის მეთოდად გამოიძახება (obj.method()), this მიუთითებს იმ ობიექტზე, რომელიც მეთოდს იძახებს. მნიშვნელოვანია: this განისაზღვრება გამოძახების მომენტში, არა განსაზღვრების მომენტში."
      },
      {
        topic: 'this keyword',
        question: "რას გამოიტანს ეს კოდი strict mode-ში?",
        code: `'use strict';
function showThis() {
  console.log(this);
}
showThis();`,
        options: [
          "window ობიექტს",
          "undefined",
          "ცარიელ ობიექტს {}",
          "Error"
        ],
        correct: 1,
        explanation: "strict mode-ში ჩვეულებრივი ფუნქციის გამოძახებისას (არა მეთოდის) this არის undefined. sloppy mode-ში (strict-ის გარეშე) this იქნებოდა window ობიექტი. ეს არის ერთ-ერთი მნიშვნელოვანი განსხვავება strict და sloppy mode-ს შორის."
      },
      {
        topic: 'Arrow Functions & this',
        question: "რას გამოიტანს ეს კოდი?",
        code: `const person = {
  name: 'Ana',
  greet: () => {
    console.log(\`Hello \${this.name}\`);
  }
};
person.greet();`,
        options: [
          '"Hello Ana"',
          '"Hello undefined"',
          '"Hello"',
          'TypeError'
        ],
        correct: 1,
        explanation: "Arrow ფუნქციებს არ აქვთ საკუთარი this — ისინი მშობელი scope-ის this-ს იყენებენ. ამ შემთხვევაში მშობელი scope გლობალურია (ობიექტის ლიტერალი scope-ს არ ქმნის!), სადაც this.name არის undefined. ამიტომ arrow ფუნქციები არ უნდა გამოიყენოთ ობიექტის მეთოდებად."
      },
      {
        topic: 'Arrow Functions & this',
        question: "რას გამოიტანს ეს კოდი?",
        code: `const team = {
  name: 'Eagles',
  players: ['Ana', 'Luka'],
  showPlayers: function() {
    this.players.forEach(player => {
      console.log(\`\${player} plays for \${this.name}\`);
    });
  }
};
team.showPlayers();`,
        options: [
          '"Ana plays for Eagles" და "Luka plays for Eagles"',
          '"Ana plays for undefined" და "Luka plays for undefined"',
          'TypeError',
          '"undefined plays for Eagles"'
        ],
        correct: 0,
        explanation: "forEach-ის callback არის arrow ფუნქცია, რომელიც this-ს მშობელი scope-დან (showPlayers მეთოდი) იღებს. showPlayers ჩვეულებრივი ფუნქციაა და team-ის მეთოდად გამოიძახეს, ამიტომ this = team. arrow ფუნქცია ამ this-ს იყენებს. სწორედ ამ შემთხვევაში არის arrow ფუნქცია კარგი არჩევანი!"
      },
      {
        topic: 'Primitives vs Objects',
        question: "რას გამოიტანს ეს კოდი?",
        code: `let a = 10;
let b = a;
a = 20;
console.log(a, b);`,
        options: [
          "20 20",
          "20 10",
          "10 10",
          "10 20"
        ],
        correct: 1,

    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);

    const progressBar = document.getElementById('progressBar');
    const questionCounter = document.getElementById('questionCounter');
    const questionCard = document.getElementById('questionCard');
    const sectionLabel = document.getElementById('sectionLabel');
    const questionText = document.getElementById('questionText');
    const codeBlock = document.getElementById('codeBlock');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const explanationBox = document.getElementById('explanationBox');
    const explanationText = document.getElementById('explanationText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const questionArea = document.getElementById('questionArea');
    const resultsScreen = document.getElementById('resultsScreen');

    function renderQuestion() {
      const q = questions[currentIndex];
      const total = questions.length;

      progressBar.style.width = ((currentIndex + 1) / total * 100) + '%';
      questionCounter.textContent = `შეკითხვა ${currentIndex + 1} / ${total}`;

      sectionLabel.textContent = q.topic;
      sectionLabel.className = 'section-label main';

      questionText.innerHTML = q.question;

      if (q.code) {
        codeBlock.textContent = q.code;
        codeBlock.classList.remove('hidden');
      } else {
        codeBlock.classList.add('hidden');
      }

      optionsContainer.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = opt;
        const answered = answers[currentIndex] !== null;

        if (answered) {
          btn.classList.add('disabled');
          if (i === q.correct) btn.classList.add('correct-answer');
          if (answers[currentIndex] === i && i !== q.correct) btn.classList.add('wrong-answer');
        } else {
          btn.addEventListener('click', () => selectAnswer(i));
        }
        optionsContainer.appendChild(btn);
      });

      if (answers[currentIndex] !== null) {
        feedback.classList.add('show');
        if (answers[currentIndex] === q.correct) {
          feedback.className = 'feedback show correct';
          feedback.textContent = 'სწორია! ';
          questionCard.classList.remove('incorrect');
          questionCard.classList.add('correct');
        } else {
          feedback.className = 'feedback show incorrect';
          feedback.textContent = 'არასწორია! სწორი პასუხი მონიშნულია მწვანედ.';
          questionCard.classList.remove('correct');
          questionCard.classList.add('incorrect');
        }
      } else {
        feedback.className = 'feedback';
        feedback.classList.remove('show');
        questionCard.classList.remove('correct', 'incorrect');
      }

      if (answers[currentIndex] !== null && q.explanation) {
        explanationText.textContent = q.explanation;
        explanationBox.classList.add('visible');
      } else {
        explanationBox.classList.remove('visible');
      }

      prevBtn.disabled = currentIndex === 0;
      nextBtn.textContent = currentIndex === total - 1 ? 'შედეგები →' : 'შემდეგი →';
    }

    function selectAnswer(index) {
      answers[currentIndex] = index;
      renderQuestion();
    }

    function navigate(dir) {
      if (dir === 1 && currentIndex === questions.length - 1) {
        showResults();
        return;
      }
      currentIndex += dir;
      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showResults() {
      questionArea.classList.add('hidden');
      resultsScreen.classList.remove('hidden');

      let totalCorrect = 0;
      questions.forEach((q, i) => {
        if (answers[i] === q.correct) totalCorrect++;
      });

      const percent = Math.round(totalCorrect / questions.length * 100);
      const scoreCircle = document.getElementById('scoreCircle');
      const scorePercent = document.getElementById('scorePercent');
      const scoreLabel = document.getElementById('scoreLabel');
      const scoreBreakdown = document.getElementById('scoreBreakdown');

      scorePercent.textContent = percent + '%';

      if (percent >= 80) {
        scoreCircle.className = 'score-circle excellent';
        scoreLabel.textContent = 'შესანიშნავი!';
      } else if (percent >= 50) {
        scoreCircle.className = 'score-circle good';
        scoreLabel.textContent = 'კარგია!';
      } else {
        scoreCircle.className = 'score-circle needs-work';
        scoreLabel.textContent = 'გაიმეორე მასალა';
      }

      scoreBreakdown.innerHTML = `
        <strong>სულ:</strong> ${totalCorrect} / ${questions.length} სწორი პასუხი
      `;
    }

    function restartQuiz() {
      currentIndex = 0;
      answers = new Array(questions.length).fill(null);
      resultsScreen.classList.add('hidden');
      questionArea.classList.remove('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuestion();
  </script>
