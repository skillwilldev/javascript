<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ბრაუზერის ობიექტები და სტორიჯი - ქვიზი</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .quiz-container {
      max-width: 750px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #e94560;
      margin-bottom: 0.4rem;
      font-size: 1.6rem;
      line-height: 1.35;
    }

    .subtitle {
      text-align: center;
      color: #7f8fa6;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .progress-bar-track {
      background: #16213e;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #e94560, #0f3460);
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .question-counter {
      text-align: center;
      margin-bottom: 1rem;
      color: #7f8fa6;
      font-size: 0.95rem;
    }

    .section-label {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-label.main {
      background: #0f3460;
      color: #63b3ed;
    }

    .question-card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      border: 2px solid #0f3460;
      transition: border-color 0.3s ease;
    }

    .question-card.correct {
      border-color: #38a169;
    }

    .question-card.incorrect {
      border-color: #e53e3e;
    }

    .question-text {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      line-height: 1.55;
    }

    pre.code-block {
      background: #0d1b2a;
      border: 1px solid #1b3a5c;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      overflow-x: auto;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      color: #a8d8a8;
      white-space: pre;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-btn {
      background: #1a1a2e;
      border: 2px solid #2c3e6b;
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      color: #e0e0e0;
      font-size: 0.97rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      line-height: 1.45;
    }

    .option-btn:hover:not(.disabled) {
      background: #0f3460;
      border-color: #4a6fa5;
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: #63b3ed;
      background: #1a365d;
    }

    .option-btn.correct-answer {
      border-color: #38a169;
      background: #1c3a2a;
      color: #9ae6b4;
    }

    .option-btn.wrong-answer {
      border-color: #e53e3e;
      background: #3a1c1c;
      color: #feb2b2;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.75;
    }

    .option-btn.disabled.correct-answer {
      opacity: 1;
    }

    .feedback {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background: #1c3a2a;
      color: #68d391;
      border: 1px solid #38a169;
    }

    .feedback.incorrect {
      background: #3a1c1c;
      color: #fc8181;
      border: 1px solid #e53e3e;
    }

    .explanation-box {
      background: #0d1b2a;
      border-left: 4px solid #e94560;
      padding: 1rem 1.2rem;
      margin-top: 0.8rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.92rem;
      color: #b0bec5;
      line-height: 1.6;
      display: none;
    }

    .explanation-box.visible {
      display: block;
    }

    .explanation-box .explanation-title {
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      gap: 1rem;
    }

    .nav-btn {
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn.prev {
      background: #2c3e6b;
      color: #e0e0e0;
    }

    .nav-btn.prev:hover {
      background: #3a5298;
    }

    .nav-btn.next {
      background: #e94560;
      color: #fff;
    }

    .nav-btn.next:hover {
      background: #c73652;
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Results screen */
    .results-screen {
      background: #16213e;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      border: 2px solid #0f3460;
    }

    .results-screen h2 {
      color: #e94560;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      border: 6px solid;
    }

    .score-circle.excellent {
      border-color: #38a169;
      color: #68d391;
      background: #1c3a2a;
    }

    .score-circle.good {
      border-color: #d69e2e;
      color: #f6e05e;
      background: #3a351c;
    }

    .score-circle.needs-work {
      border-color: #e53e3e;
      color: #fc8181;
      background: #3a1c1c;
    }

    .score-circle .score-label {
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 0.2rem;
    }

    .score-breakdown {
      margin: 1.5rem 0;
      font-size: 1rem;
      color: #a0aec0;
      line-height: 2;
    }

    .score-breakdown strong {
      color: #e0e0e0;
    }

    .restart-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .restart-btn:hover {
      background: #c73652;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem 0.5rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .question-card {
        padding: 1.3rem;
      }
      pre.code-block {
        font-size: 0.8rem;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>ბრაუზერის ობიექტები და სტორიჯი<br />ქვიზი</h1>
    <p class="subtitle">Browser Objects & Storage Quiz</p>

    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <!-- Question area -->
    <div id="questionArea">
      <p class="question-counter" id="questionCounter"></p>

      <div class="question-card" id="questionCard">
        <span class="section-label main" id="sectionLabel"></span>
        <div class="question-text" id="questionText"></div>
        <pre class="code-block hidden" id="codeBlock"></pre>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation-box" id="explanationBox">
          <div class="explanation-title">ახსნა</div>
          <div id="explanationText"></div>
        </div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">&#8592; წინა</button>
        <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">შემდეგი &#8594;</button>
      </div>
    </div>

    <!-- Results screen -->
    <div class="results-screen hidden" id="resultsScreen">
      <h2>ქვიზი დასრულებულია!</h2>
      <div class="score-circle" id="scoreCircle">
        <span id="scorePercent"></span>
        <span class="score-label" id="scoreLabel"></span>
      </div>
      <div class="score-breakdown" id="scoreBreakdown"></div>
      <button class="restart-btn" onclick="restartQuiz()">&#x1F504; თავიდან ცდა</button>
    </div>
  </div>

  <script>
    const questions = [
      // ===== Window Object (Q1-Q3) =====
      {
        topic: 'Window Object',
        question: "რომელი მეთოდი აჩერებს <code>setInterval()</code>-ით დაწყებულ ტაიმერს?",
        code: null,
        options: [
          "clearTimeout()",
          "clearInterval()",
          "stopInterval()",
          "window.stop()"
        ],
        correct: 1,
        explanation: "setInterval()-ით დაწყებული განმეორებადი ტაიმერის გასაჩერებლად გამოიყენება clearInterval(). clearTimeout() კი setTimeout()-ის გასაჩერებლადაა განკუთვნილი."
      },
      {
        topic: 'Cookies',
        question: "რა განსხვავებაა cookie-ში <code>expires</code> და <code>max-age</code> ატრიბუტებს შორის?",
        code: null,
        options: [
          "არანაირი განსხვავება, ორივე ერთნაირად მუშაობს",
          "expires კონკრეტულ თარიღს მიუთითებს, max-age კი სეკუნდებს (ვადის ხანგრძლივობას)",
          "max-age მხოლოდ ძველ ბრაუზერებში მუშაობს",
          "expires მხოლოდ სერვერზე მუშაობს"
        ],
        correct: 1,
        explanation: "expires ატრიბუტი იღებს კონკრეტულ თარიღს UTC ფორმატში (მაგ. 'Thu, 01 Jan 2026 00:00:00 UTC'), ხოლო max-age იღებს წამების რაოდენობას ამჟამინდელი მომენტიდან (მაგ. 3600 = 1 საათი). ორივე cookie-ს ვადას განსაზღვრავს, მაგრამ max-age უფრო მარტივია გამოსაყენებლად."
      },
      {
        topic: 'Window Object',
        question: "რას აბრუნებს <code>setTimeout()</code>?",
        code: null,
        options: [
          "undefined",
          "callback ფუნქციის შედეგს",
          "რიცხვით timer ID-ს, რომელიც clearTimeout-ს გადაეცემა",
          "Promise ობიექტს"
        ],
        correct: 2,
        explanation: "setTimeout() აბრუნებს რიცხვით ID-ს (timer ID), რომელიც შეიძლება clearTimeout()-ს გადაეცეს ტაიმერის გასაუქმებლად, სანამ ის შესრულდება."
      },
      {
        topic: 'Window Object',
        question: "რას აკეთებს <code>window.confirm('Sure?')</code>?",
        code: null,
        options: [
          "ლოგავს შეტყობინებას კონსოლში",
          "აჩვენებს დიალოგს OK/Cancel ღილაკებით და აბრუნებს true/false",
          "აჩვენებს დიალოგს მხოლოდ OK ღილაკით",
          "აჩვენებს დიალოგს ტექსტის შეყვანის ველით"
        ],
        correct: 1,
        explanation: "window.confirm() აჩვენებს მოდალურ დიალოგს OK და Cancel ღილაკებით. OK დაჭერისას აბრუნებს true-ს, Cancel-ის დაჭერისას — false-ს. window.alert()-ს მხოლოდ OK აქვს, window.prompt()-ს კი შეყვანის ველი."
      },

      // ===== Navigator Object (Q5-Q7) =====
      {
        topic: 'Navigator Object',
        question: "რომელი თვისება ამოწმებს, აქვს თუ არა ბრაუზერს ინტერნეტ კავშირი?",
        code: null,
        options: [
          "navigator.connection",
          "navigator.isOnline",
          "navigator.onLine",
          "navigator.network"
        ],
        correct: 2,
        explanation: "navigator.onLine აბრუნებს boolean-ს: true თუ ბრაუზერი ონლაინაა, false თუ ოფლაინ. ყურადღება: 'onLine' იწერება 'L'-ით (camelCase). ასევე შეგიძლიათ მოუსმინოთ 'online' და 'offline' ივენთებს window-ზე."
      },
      {
        topic: 'Navigator Object',
        question: "რას აბრუნებს <code>navigator.language</code>?",
        code: null,
        options: [
          "ბრაუზერის პროგრამირების ენას (მაგ. 'JavaScript')",
          "მომხმარებლის სასურველ ენას (მაგ. 'en-US', 'ka')",
          "ვებ-გვერდის ენას",
          "ოპერაციული სისტემის ენას"
        ],
        correct: 1,
        explanation: "navigator.language აბრუნებს მომხმარებლის ბრაუზერის სასურველ ენას BCP 47 ფორმატში, მაგ. 'en-US', 'ka', 'de'. navigator.languages (მრავლობითში) აბრუნებს სასურველი ენების მასივს პრიორიტეტის მიხედვით."
      },
      {
        topic: 'Navigator Object',
        question: "რატომ არ არის სანდო <code>navigator.userAgent</code> ბრაუზერის იდენტიფიკაციისთვის?",
        code: null,
        options: [
          "userAgent ყოველთვის ცარიელ სტრინგს აბრუნებს",
          "userAgent მხოლოდ ძველ ბრაუზერებში მუშაობს",
          "ბრაუზერები ხშირად ყალბ ინფორმაციას ათავსებენ userAgent-ში თავსებადობისთვის",
          "userAgent მხოლოდ სერვერზე ხელმისაწვდომია"
        ],
        correct: 2,
        explanation: "ისტორიულად ბრაუზერები ერთმანეთის სახელებს ათავსებდნენ userAgent სტრინგში, რომ ვებ-გვერდებმა მათი ბლოკი არ მოახდინონ. მაგალითად, Chrome-ის userAgent შეიცავს 'Safari'-სა და 'Mozilla'-ს. ამიტომ feature detection (ფიჩერის აღმოჩენა) უფრო სანდოა, ვიდრე userAgent-ის შემოწმება."
      },

      // ===== Screen Object (Q8-Q9) =====
      {
        topic: 'Screen Object',
        question: "რა განსხვავებაა <code>screen.width</code> და <code>screen.availWidth</code> შორის?",
        code: null,
        options: [
          "არანაირი განსხვავება, ორივე ერთნაირია",
          "screen.width მოიცავს სისტემის ინტერფეისს (taskbar), availWidth არ მოიცავს",
          "screen.width არის ეკრანის სრული გარჩევადობა, availWidth გამორიცხავს სისტემის ზოლებს (taskbar)",
          "availWidth მხოლოდ მობილურ მოწყობილობებზე მუშაობს"
        ],
        correct: 2,
        explanation: "screen.width აბრუნებს ეკრანის სრულ სიგანეს პიქსელებში. screen.availWidth აბრუნებს ხელმისაწვდომ სიგანეს, სისტემის ინტერფეისის ელემენტების (მაგ. Windows Taskbar, macOS Dock) გამოკლებით."
      },
      {
        topic: 'Screen Object',
        question: "რას აბრუნებს <code>window.devicePixelRatio</code> Retina ეკრანზე?",
        code: null,
        options: [
          "1",
          "2 ან მეტი",
          "0.5",
          "undefined"
        ],
        correct: 1,
        explanation: "Retina (HiDPI) ეკრანებზე devicePixelRatio ჩვეულებრივ 2-ია (ან 3 ახალ მოწყობილობებზე). ეს ნიშნავს, რომ ერთი CSS პიქსელი 2x2 (ან 3x3) ფიზიკური პიქსელით გამოისახება. ჩვეულებრივ ეკრანებზე ეს მნიშვნელობა 1-ია."
      },

      // ===== Location Object (Q10-Q12) =====
      {
        topic: 'Location Object',
        question: "რა განსხვავებაა <code>location.assign()</code> და <code>location.replace()</code> შორის?",
        code: null,
        options: [
          "არანაირი განსხვავება",
          "assign() ინახავს ისტორიაში (შეიძლება უკან დაბრუნება), replace() არ ინახავს",
          "replace() უფრო სწრაფია",
          "assign() მხოლოდ ფარდობით URL-ებთან მუშაობს"
        ],
        correct: 1,
        explanation: "location.assign(url) ახალ გვერდს ტვირთავს და ჩანაწერს ამატებს ბრაუზერის ისტორიაში — მომხმარებელს შეუძლია back ღილაკით უკან დაბრუნება. location.replace(url) კი ახალ გვერდს ტვირთავს, მაგრამ ისტორიაში მიმდინარე ჩანაწერს ანაცვლებს — უკან დაბრუნება შეუძლებელია."
      },

    // State
    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);

    // DOM elements
    const progressBar = document.getElementById('progressBar');
    const questionCounter = document.getElementById('questionCounter');
    const questionCard = document.getElementById('questionCard');
    const sectionLabel = document.getElementById('sectionLabel');
    const questionText = document.getElementById('questionText');
    const codeBlock = document.getElementById('codeBlock');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const explanationBox = document.getElementById('explanationBox');
    const explanationText = document.getElementById('explanationText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const questionArea = document.getElementById('questionArea');
    const resultsScreen = document.getElementById('resultsScreen');

    function renderQuestion() {
      const q = questions[currentIndex];
      const total = questions.length;

      // Progress
      progressBar.style.width = ((currentIndex + 1) / total * 100) + '%';
      questionCounter.textContent = `კითხვა ${currentIndex + 1} / ${total}`;

      // Section label
      sectionLabel.textContent = q.topic;
      sectionLabel.className = 'section-label main';

      // Question text
      questionText.innerHTML = q.question;

      // Code block
      if (q.code) {
        codeBlock.textContent = q.code;
        codeBlock.classList.remove('hidden');
      } else {
        codeBlock.classList.add('hidden');
      }

      // Options
      optionsContainer.innerHTML = '';
      q.options.forEach(function (opt, i) {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = opt;
        const answered = answers[currentIndex] !== null;

        if (answered) {
          btn.classList.add('disabled');
          if (i === q.correct) {
            btn.classList.add('correct-answer');
          }
          if (answers[currentIndex] === i && i !== q.correct) {
            btn.classList.add('wrong-answer');
          }
        } else {
          btn.addEventListener('click', function () { selectAnswer(i); });
        }

        optionsContainer.appendChild(btn);
      });

      // Feedback
      if (answers[currentIndex] !== null) {
        feedback.classList.add('show');
        if (answers[currentIndex] === q.correct) {
          feedback.className = 'feedback show correct';
          feedback.textContent = 'სწორია! ';
          questionCard.classList.remove('incorrect');
          questionCard.classList.add('correct');
        } else {
          feedback.className = 'feedback show incorrect';
          feedback.textContent = 'არასწორია! სწორი პასუხი მონიშნულია მწვანედ.';
          questionCard.classList.remove('correct');
          questionCard.classList.add('incorrect');
        }
      } else {
        feedback.className = 'feedback';
        feedback.classList.remove('show');
        questionCard.classList.remove('correct', 'incorrect');
      }

      if (answers[currentIndex] !== null && q.explanation) {
        explanationText.textContent = q.explanation;
        explanationBox.classList.add('visible');
      } else {
        explanationBox.classList.remove('visible');
      }

      // Nav buttons
      prevBtn.disabled = currentIndex === 0;
      if (currentIndex === total - 1) {
        nextBtn.textContent = 'შედეგები →';
      } else {
        nextBtn.textContent = 'შემდეგი →';
      }
    }

    function selectAnswer(index) {
      answers[currentIndex] = index;
      renderQuestion();
    }

    function navigate(dir) {
      if (dir === 1 && currentIndex === questions.length - 1) {
        showResults();
        return;
      }
      currentIndex += dir;
      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showResults() {
      questionArea.classList.add('hidden');
      resultsScreen.classList.remove('hidden');

      let totalCorrect = 0;
      questions.forEach(function (q, i) {
        if (answers[i] === q.correct) totalCorrect++;
      });

      const percent = Math.round(totalCorrect / questions.length * 100);
      const scoreCircle = document.getElementById('scoreCircle');
      const scorePercent = document.getElementById('scorePercent');
      const scoreLabel = document.getElementById('scoreLabel');
      const scoreBreakdown = document.getElementById('scoreBreakdown');

      scorePercent.textContent = percent + '%';

      if (percent >= 80) {
        scoreCircle.className = 'score-circle excellent';
        scoreLabel.textContent = 'შესანიშნავი!';
      } else if (percent >= 50) {
        scoreCircle.className = 'score-circle good';
        scoreLabel.textContent = 'კარგია!';
      } else {
        scoreCircle.className = 'score-circle needs-work';
        scoreLabel.textContent = 'გაიმეორე მასალა';
      }

      scoreBreakdown.innerHTML = '<strong>სულ:</strong> ' + totalCorrect + ' / ' + questions.length + ' სწორი პასუხი';
    }

    function restartQuiz() {
      currentIndex = 0;
      answers = new Array(questions.length).fill(null);
      resultsScreen.classList.add('hidden');
      questionArea.classList.remove('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Init
    renderQuestion();
  </script>
