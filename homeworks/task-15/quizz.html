<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callback-ები, ტაიმერები და DOM - ქვიზი</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .quiz-container {
      max-width: 750px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #e94560;
      margin-bottom: 0.4rem;
      font-size: 1.6rem;
      line-height: 1.35;
    }

    .subtitle {
      text-align: center;
      color: #7f8fa6;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .progress-bar-track {
      background: #16213e;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #e94560, #0f3460);
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .question-counter {
      text-align: center;
      margin-bottom: 1rem;
      color: #7f8fa6;
      font-size: 0.95rem;
    }

    .section-label {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-label.main {
      background: #0f3460;
      color: #63b3ed;
    }

    .question-card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      border: 2px solid #0f3460;
      transition: border-color 0.3s ease;
    }

    .question-card.correct {
      border-color: #38a169;
    }

    .question-card.incorrect {
      border-color: #e53e3e;
    }

    .question-text {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      line-height: 1.55;
    }

    pre.code-block {
      background: #0d1b2a;
      border: 1px solid #1b3a5c;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      overflow-x: auto;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      color: #a8d8a8;
      white-space: pre;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-btn {
      background: #1a1a2e;
      border: 2px solid #2c3e6b;
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      color: #e0e0e0;
      font-size: 0.97rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      line-height: 1.45;
    }

    .option-btn:hover:not(.disabled) {
      background: #0f3460;
      border-color: #4a6fa5;
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: #63b3ed;
      background: #1a365d;
    }

    .option-btn.correct-answer {
      border-color: #38a169;
      background: #1c3a2a;
      color: #9ae6b4;
    }

    .option-btn.wrong-answer {
      border-color: #e53e3e;
      background: #3a1c1c;
      color: #feb2b2;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.75;
    }

    .option-btn.disabled.correct-answer {
      opacity: 1;
    }

    .feedback {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background: #1c3a2a;
      color: #68d391;
      border: 1px solid #38a169;
    }

    .feedback.incorrect {
      background: #3a1c1c;
      color: #fc8181;
      border: 1px solid #e53e3e;
    }

    .explanation-box {
      background: #0d1b2a;
      border-left: 4px solid #e94560;
      padding: 1rem 1.2rem;
      margin-top: 0.8rem;
      border-radius: 0 8px 8px 0;
      font-size: 0.92rem;
      color: #b0bec5;
      line-height: 1.6;
      display: none;
    }

    .explanation-box.visible {
      display: block;
    }

    .explanation-box .explanation-title {
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      gap: 1rem;
    }

    .nav-btn {
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn.prev {
      background: #2c3e6b;
      color: #e0e0e0;
    }

    .nav-btn.prev:hover {
      background: #3a5298;
    }

    .nav-btn.next {
      background: #e94560;
      color: #fff;
    }

    .nav-btn.next:hover {
      background: #c73652;
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Results screen */
    .results-screen {
      background: #16213e;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      border: 2px solid #0f3460;
    }

    .results-screen h2 {
      color: #e94560;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      border: 6px solid;
    }

    .score-circle.excellent {
      border-color: #38a169;
      color: #68d391;
      background: #1c3a2a;
    }

    .score-circle.good {
      border-color: #d69e2e;
      color: #f6e05e;
      background: #3a351c;
    }

    .score-circle.needs-work {
      border-color: #e53e3e;
      color: #fc8181;
      background: #3a1c1c;
    }

    .score-circle .score-label {
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 0.2rem;
    }

    .score-breakdown {
      margin: 1.5rem 0;
      font-size: 1rem;
      color: #a0aec0;
      line-height: 2;
    }

    .score-breakdown strong {
      color: #e0e0e0;
    }

    .restart-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .restart-btn:hover {
      background: #c73652;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem 0.5rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .question-card {
        padding: 1.3rem;
      }
      pre.code-block {
        font-size: 0.8rem;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>Callback-ები, ტაიმერები და DOM<br />ქვიზი</h1>
    <p class="subtitle">Callbacks, Timers & DOM Quiz</p>

    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <!-- Question area -->
    <div id="questionArea">
      <p class="question-counter" id="questionCounter"></p>

      <div class="question-card" id="questionCard">
        <span class="section-label main" id="sectionLabel"></span>
        <div class="question-text" id="questionText"></div>
        <pre class="code-block hidden" id="codeBlock"></pre>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation-box" id="explanationBox">
          <div class="explanation-title">ახსნა</div>
          <div id="explanationText"></div>
        </div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">&#8592; წინა</button>
        <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">შემდეგი &#8594;</button>
      </div>
    </div>

    <!-- Results screen -->
    <div class="results-screen hidden" id="resultsScreen">
      <h2>ქვიზი დასრულებულია!</h2>
      <div class="score-circle" id="scoreCircle">
        <span id="scorePercent"></span>
        <span class="score-label" id="scoreLabel"></span>
      </div>
      <div class="score-breakdown" id="scoreBreakdown"></div>
      <button class="restart-btn" onclick="restartQuiz()">&#x1F504; თავიდან ცდა</button>
    </div>
  </div>

  <script>
    const questions = [
      // ===== Callbacks (Q1-Q5) =====
      {
        topic: 'Callback ფუნქციები',
        question: "რა არის callback ფუნქცია?",
        code: null,
        options: [
          "ფუნქცია, რომელიც ავტომატურად სრულდება პროგრამის დაწყებისას",
          "ფუნქცია, რომელიც სხვა ფუნქციას არგუმენტად გადაეცემა და მოგვიანებით გამოიძახება",
          "ფუნქცია, რომელიც მხოლოდ ერთხელ შეიძლება გამოიძახო",
          "ფუნქცია, რომელიც ყოველთვის მნიშვნელობას აბრუნებს"
        ],
        correct: 1,
        explanation: "Callback ფუნქცია არის ფუნქცია, რომელიც სხვა ფუნქციას არგუმენტად გადაეცემა და მოგვიანებით (ან გარკვეული პირობის შესრულებისას) გამოიძახება. JavaScript-ში ფუნქციები 'პირველი კლასის მოქალაქეები' არიან, ამიტომ მათი გადაცემა არგუმენტად შესაძლებელია."
      },
      {
        topic: 'Callback ფუნქციები',
        question: "რა არის higher-order ფუნქცია (მაღალი რიგის ფუნქცია)?",
        code: null,
        options: [
          "ფუნქცია, რომელიც მხოლოდ რიცხვებთან მუშაობს",
          "ფუნქცია, რომელიც global scope-შია განსაზღვრული",
          "ფუნქცია, რომელიც სხვა ფუნქციას იღებს არგუმენტად ან ფუნქციას აბრუნებს შედეგად",
          "ფუნქცია, რომელიც რეკურსიულად იძახებს თავის თავს"
        ],
        correct: 2,
        explanation: "Higher-order ფუნქცია (მაღალი რიგის ფუნქცია) არის ფუნქცია, რომელიც: 1) სხვა ფუნქციას იღებს არგუმენტად (callback), ან 2) ფუნქციას აბრუნებს შედეგად. მაგალითად, forEach, map, filter — ყველა higher-order ფუნქციაა."
      },
      {
        topic: 'Callback ფუნქციები',
        question: "რა მოხდება, როცა ფუნქციას <code>forEach</code>-ს გადავცემთ?",
        code: `const nums = [10, 20, 30];
nums.forEach(function(num) {
  console.log(num * 2);
});`,
        options: [
          "დაიბეჭდება: [20, 40, 60]",
          "დაიბეჭდება ცალ-ცალკე: 20, 40, 60 (თითო ხაზზე)",
          "დაბრუნდება ახალი მასივი [20, 40, 60]",
          "Error — forEach არ იღებს ფუნქციას არგუმენტად"
        ],
        correct: 1,
        explanation: "forEach მასივის ყოველ ელემენტზე გამოიძახებს გადაცემულ callback ფუნქციას. ამ შემთხვევაში console.log გამოიძახება 3-ჯერ და დაიბეჭდება 20, 40, 60 ცალ-ცალკე ხაზზე. forEach არ აბრუნებს ახალ მასივს (განსხვავებით map-ისგან)."
      },
      {
        topic: 'Callback ფუნქციები',
        question: "რას გამოიტანს ეს კოდი?",
        code: `const calculate = function(a, b, operation) {
  return operation(a, b);
};

const result = calculate(10, 5, function(x, y) {
  return x - y;
});
console.log(result);`,
        options: [
          "undefined",
          "15",
          "5",
          "Error — ანონიმური ფუნქცია ვერ იქნება callback"
        ],
        correct: 2,
        explanation: "calculate ფუნქცია იღებს ორ რიცხვს და operation callback-ს. ანონიმური ფუნქცია function(x, y) { return x - y; } გამოითვლის 10 - 5 = 5. callback-ად შეიძლება როგორც სახელობითი, ასევე ანონიმური ფუნქციის გადაცემა."
      },
      {
        topic: 'Callback ფუნქციები',
        question: "რას გამოიტანს ეს კოდი?",
        code: `const processArray = function(arr, callback) {
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    result.push(callback(arr[i]));
  }
  return result;
};

console.log(processArray([1, 2, 3], function(n) {
  return n % 2 === 0;
}));`,
        options: [
          "[1, 2, 3]",
          "[false, true, false]",
          "[2]",
          "Error"
        ],
        correct: 1,
        explanation: "processArray ყოველ ელემენტზე იძახებს callback-ს და შედეგს ახალ მასივში ათავსებს. callback ამოწმებს ლუწია თუ არა რიცხვი: 1 % 2 === 0 → false, 2 % 2 === 0 → true, 3 % 2 === 0 → false. შედეგი: [false, true, false]."
      },

      // ===== setTimeout (Q6-Q8) =====
      {
        topic: 'setTimeout',
        question: "რას აბრუნებს <code>setTimeout()</code>?",
        code: null,
        options: [
          "undefined",
          "callback ფუნქციის შედეგს",
          "რიცხვით timer ID-ს, რომელიც clearTimeout-ს გადაეცემა",
          "Promise ობიექტს"
        ],
        correct: 2,
        explanation: "setTimeout() აბრუნებს რიცხვით ID-ს (timer ID), რომელიც შეიძლება clearTimeout()-ს გადაეცეს ტაიმერის გასაუქმებლად, სანამ ის შესრულდება. ეს ID უნიკალურია და ბრაუზერი მას ტაიმერის იდენტიფიკაციისთვის იყენებს."
      },
      {
        topic: 'setTimeout',
        question: "რას აკეთებს <code>clearTimeout()</code>?",
        code: `const timerId = setTimeout(function() {
  console.log("Hello!");
}, 5000);

clearTimeout(timerId);`,
        options: [
          "აჩერებს JavaScript-ის შესრულებას 5 წამით",
          "აუქმებს მომლოდინე timeout-ს და callback აღარ შესრულდება",
          "მაშინვე ასრულებს callback-ს, დაყოვნების გარეშე",
          "შლის callback ფუნქციას მეხსიერებიდან"
        ],
        correct: 1,
        explanation: "clearTimeout() იღებს setTimeout()-ის მიერ დაბრუნებულ timer ID-ს და აუქმებს მომლოდინე ტაიმერს. ამ მაგალითში 'Hello!' აღარასდროს დაიბეჭდება, რადგან ტაიმერი გაუქმებულია clearTimeout-ის გამოძახებით."
      },
      {
        topic: 'setTimeout',
        question: "რას გამოიტანს ეს კოდი და რა თანმიმდევრობით?",
        code: `console.log("1");
setTimeout(function() {
  console.log("2");
}, 0);
console.log("3");`,
        options: [
          "1, 2, 3",
          "1, 3, 2",
          "2, 1, 3",
          "1, 3 (2 არასდროს დაიბეჭდება)"
        ],
        correct: 1,
        explanation: "მიუხედავად იმისა, რომ setTimeout-ის დაყოვნება 0 მილიწამია, ის მაინც ასინქრონულია. JavaScript ჯერ სრულდება სინქრონული კოდი (ბეჭდავს '1' და '3'), შემდეგ კი, call stack-ის გასუფთავების შემდეგ, ასრულებს setTimeout-ის callback-ს (ბეჭდავს '2'). თანმიმდევრობა: 1, 3, 2."
      },

      // ===== setInterval (Q9-Q11) =====
      {
        topic: 'setInterval',
        question: "როგორ ვაჩერებთ <code>setInterval()</code>-ით დაწყებულ ტაიმერს?",
        code: null,
        options: [
          "stopInterval() ფუნქციით",
          "clearTimeout() ფუნქციით",
          "clearInterval() ფუნქციით, interval ID-ის გადაცემით",
          "setInterval-ს ავტომატურად აქვს stop() მეთოდი"
        ],
        correct: 2,
        explanation: "setInterval() აბრუნებს interval ID-ს (რიცხვს). ამ ID-ს clearInterval()-ს გადავცემთ ინტერვალის გასაჩერებლად. clearTimeout() კი setTimeout()-ისთვისაა განკუთვნილი. stopInterval() და stop() მეთოდი არ არსებობს."
      },
      {
        topic: 'setInterval',
        question: "რა არის მთავარი განსხვავება <code>setTimeout</code> და <code>setInterval</code> შორის?",
        code: null,

    // State
    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);

    // DOM elements
    const progressBar = document.getElementById('progressBar');
    const questionCounter = document.getElementById('questionCounter');
    const questionCard = document.getElementById('questionCard');
    const sectionLabel = document.getElementById('sectionLabel');
    const questionText = document.getElementById('questionText');
    const codeBlock = document.getElementById('codeBlock');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const explanationBox = document.getElementById('explanationBox');
    const explanationText = document.getElementById('explanationText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const questionArea = document.getElementById('questionArea');
    const resultsScreen = document.getElementById('resultsScreen');

    function renderQuestion() {
      const q = questions[currentIndex];
      const total = questions.length;

      // Progress
      progressBar.style.width = ((currentIndex + 1) / total * 100) + '%';
      questionCounter.textContent = `კითხვა ${currentIndex + 1} / ${total}`;

      // Section label
      sectionLabel.textContent = q.topic;
      sectionLabel.className = 'section-label main';

      // Question text
      questionText.innerHTML = q.question;

      // Code block
      if (q.code) {
        codeBlock.textContent = q.code;
        codeBlock.classList.remove('hidden');
      } else {
        codeBlock.classList.add('hidden');
      }

      // Options
      optionsContainer.innerHTML = '';
      q.options.forEach(function (opt, i) {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = opt;
        const answered = answers[currentIndex] !== null;

        if (answered) {
          btn.classList.add('disabled');
          if (i === q.correct) {
            btn.classList.add('correct-answer');
          }
          if (answers[currentIndex] === i && i !== q.correct) {
            btn.classList.add('wrong-answer');
          }
        } else {
          btn.addEventListener('click', function () { selectAnswer(i); });
        }

        optionsContainer.appendChild(btn);
      });

      // Feedback
      if (answers[currentIndex] !== null) {
        feedback.classList.add('show');
        if (answers[currentIndex] === q.correct) {
          feedback.className = 'feedback show correct';
          feedback.textContent = 'სწორია! ';
          questionCard.classList.remove('incorrect');
          questionCard.classList.add('correct');
        } else {
          feedback.className = 'feedback show incorrect';
          feedback.textContent = 'არასწორია! სწორი პასუხი მონიშნულია მწვანედ.';
          questionCard.classList.remove('correct');
          questionCard.classList.add('incorrect');
        }
      } else {
        feedback.className = 'feedback';
        feedback.classList.remove('show');
        questionCard.classList.remove('correct', 'incorrect');
      }

      if (answers[currentIndex] !== null && q.explanation) {
        explanationText.textContent = q.explanation;
        explanationBox.classList.add('visible');
      } else {
        explanationBox.classList.remove('visible');
      }

      // Nav buttons
      prevBtn.disabled = currentIndex === 0;
      if (currentIndex === total - 1) {
        nextBtn.textContent = 'შედეგები →';
      } else {
        nextBtn.textContent = 'შემდეგი →';
      }
    }

    function selectAnswer(index) {
      answers[currentIndex] = index;
      renderQuestion();
    }

    function navigate(dir) {
      if (dir === 1 && currentIndex === questions.length - 1) {
        showResults();
        return;
      }
      currentIndex += dir;
      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showResults() {
      questionArea.classList.add('hidden');
      resultsScreen.classList.remove('hidden');

      let totalCorrect = 0;
      questions.forEach(function (q, i) {
        if (answers[i] === q.correct) totalCorrect++;
      });

      const percent = Math.round(totalCorrect / questions.length * 100);
      const scoreCircle = document.getElementById('scoreCircle');
      const scorePercent = document.getElementById('scorePercent');
      const scoreLabel = document.getElementById('scoreLabel');
      const scoreBreakdown = document.getElementById('scoreBreakdown');

      scorePercent.textContent = percent + '%';

      if (percent >= 80) {
        scoreCircle.className = 'score-circle excellent';
        scoreLabel.textContent = 'შესანიშნავი!';
      } else if (percent >= 50) {
        scoreCircle.className = 'score-circle good';
        scoreLabel.textContent = 'კარგია!';
      } else {
        scoreCircle.className = 'score-circle needs-work';
        scoreLabel.textContent = 'გაიმეორე მასალა';
      }

      scoreBreakdown.innerHTML = '<strong>სულ:</strong> ' + totalCorrect + ' / ' + questions.length + ' სწორი პასუხი';
    }

    function restartQuiz() {
      currentIndex = 0;
      answers = new Array(questions.length).fill(null);
      resultsScreen.classList.add('hidden');
      questionArea.classList.remove('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Init
    renderQuestion();
  </script>
